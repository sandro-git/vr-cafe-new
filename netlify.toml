# Netlify configuration
[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  BUN_VERSION = "1.3.2"

# Pages HTML prérendues : cache CDN 1h, sert le stale pendant 24h le temps de revalidation
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

# Assets statiques Astro : cache immutable 1 an (hash dans le nom de fichier)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Configuration pour les fichiers .well-known
# Important pour Apple Pay et autres services
[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirection pour s'assurer que les fichiers .well-known sont accessibles
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200
  force = false